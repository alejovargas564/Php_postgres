<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller: Registro de Sugerencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-container { 
            max-width: 500px; 
            margin: 50px auto; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .header-taller { text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <div class="header-taller">
            <h2 class="text-primary">Taller Académico</h2>
            <p class="text-muted">PostgreSQL + MongoDB Atlas</p>
        </div>

        <form action="controlador/logica.php" method="POST">
            <div class="mb-3">
                <label for="nom" class="form-label font-weight-bold">Nombre completo:</label>
                <input type="text" name="nom" id="nom" required class="form-control" placeholder="Ej: Juan Pérez">
            </div>

            <div class="mb-3">
                <label for="tel" class="form-label">Teléfono de contacto:</label>
                <input type="number" name="tel" id="tel" required min="3000000000" max="4000000000" class="form-control" placeholder="3001234567">
                <div class="form-text">Debe ser un número celular válido (10 dígitos).</div>
            </div>

            <div class="mb-3">
                <label for="det" class="form-label">Detalles de la sugerencia:</label>
                <textarea name="det" id="det" required class="form-control" rows="3" placeholder="Escribe aquí tu sugerencia..."></textarea>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" id="boton" class="btn btn-primary btn-lg">Enviar a Bases de Datos</button>
            </div>
        </form>
        
        <hr>
        <div class="text-center">
            <small class="text-muted">Desplegado en Render con Docker</small>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
